# Cairn bundled Sigma rule subset (FR19 / ADR-0003).
# `cairn update-rules` fetches these from SigmaHQ at the pinned commit.
# All paths are relative to the SigmaHQ `rules/` directory.
# All listed rules MUST carry an `author:` field (DRL 1.1).
# Verified: paths confirmed to exist at pin + author field present.
# Updated: 2026-06-28 — expanded from 18 to 44 rules.
# Scope: no-Sysmon environments (Security.evtx + PowerShell + process_creation via EID 4688).
# Prerequisites for full process_creation coverage:
#   1. Audit Process Creation + command line: GPO or reg key ProcessCreationIncludeCmdLine_Enabled=1
#   2. PowerShell Script Block Logging: reg key EnableScriptBlockLogging=1

