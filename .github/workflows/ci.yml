name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Reproducible-ish CI (NFR7): toolchain pinned by rust-toolchain.toml; deps locked.
env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build-test:
    name: fmt / clippy / check / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # rust-toolchain.toml drives the version + components (rustfmt, clippy).
      - name: Show toolchain
        run: rustc --version && cargo --version

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Check
        run: cargo check --workspace --locked

      - name: Test
        run: cargo test --workspace --locked

  # Cairn is a Windows-targeted tool: build + test on Windows so the PE version-resource
  # embed (build.rs/winresource) and the Windows-only output-path-safety test
  # (DirSink symlink guard) are actually exercised — the ubuntu job can't run either.
  windows:
    name: windows build / test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: rustc --version; cargo --version
      - name: Build (release — exercises the version-resource embed)
        run: cargo build --workspace --release --locked
      - name: Test
        # Require the symlink output-path-safety test to actually run (the windows-latest
        # runner can create symlinks); a silent skip would hide a broken guard.
        env:
          CAIRN_REQUIRE_SYMLINK_TESTS: "1"
        run: cargo test --workspace --locked

  audit:
    name: cargo audit (advisory scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit
        run: cargo audit --deny warnings
