# cargo-audit configuration (committed — this is a security decision record).
#
# Documented advisory exceptions. Each entry is an INFORMATIONAL advisory we have
# reviewed and accepted, not a vulnerability we are ignoring.

[advisories]
ignore = [
  # RUSTSEC-2021-0153: the `encoding` crate is unmaintained. It is a transitive
  # dependency of `evtx` 0.11 (our EVTX parser, the de-facto standard used by
  # Hayabusa/Chainsaw). It is NOT a vulnerability — only an unmaintained flag — and
  # we cannot drop it without replacing the EVTX parser. Re-evaluate if evtx removes
  # the dependency or a real CVE is filed against `encoding`.
  "RUSTSEC-2021-0153",
  # RUSTSEC-2024-0436: the `paste` crate is unmaintained. It is a transitive
  # dependency of `notatin` (our offline registry-hive parser, used by hive_reader /
  # shimcache). It is NOT a vulnerability — only an unmaintained flag — and `paste`
  # is a compile-time-only proc-macro helper (no runtime attack surface). We cannot
  # drop it without replacing notatin. Re-evaluate if notatin removes the dependency
  # or a real CVE is filed against `paste`.
  "RUSTSEC-2024-0436",
  # RUSTSEC-2026-0173: the `proc-macro-error2` crate is unmaintained. It is a
  # transitive dependency of `age` (our output encryption crate, used by AgeSink).
  # It is NOT a vulnerability — only an unmaintained flag — and proc-macro-error2 is
  # a compile-time-only proc-macro helper (no runtime attack surface). We cannot drop
  # it without replacing the age crate. Re-evaluate if age removes the dependency or
  # a real CVE is filed against `proc-macro-error2`.
  "RUSTSEC-2026-0173",
]
