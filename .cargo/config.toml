# Cargo configuration for the Cairn workspace.
#
# Note (build environment): cargo build-probe executables (serde/anyhow/thiserror
# build scripts) can trip real-time AV scanning, surfacing as `os error 5` on
# cleanup. Exclude the target dir from AV scanning to prevent this. After a
# `cargo clean`, the first build re-creates the probes; if AV ever re-locks them,
# simply re-run the build.
#
# Build artifact location: set the CARGO_TARGET_DIR environment variable to a
# path outside OneDrive (e.g. $env:CARGO_TARGET_DIR = "C:\Users\<you>\AppData\Local\cairn-target")
# to avoid OneDrive syncing/locking the target/ directory.

[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]
