# Cargo configuration for the Cairn workspace.
#
# Build artifacts are kept OUT of the OneDrive-synced source tree:
#   - avoids OneDrive uploading ~hundreds of MB of churning build output, and
#   - sidesteps OneDrive holding file handles on target/ during a build.
#
# This path is machine-specific (absolute, under the local profile). If you clone
# this repo on another machine, adjust `target-dir` or set CARGO_TARGET_DIR in the
# environment (the env var overrides this setting).
#
# Note (build environment): cargo build-probe executables (serde/anyhow/thiserror
# build scripts) can trip real-time AV scanning, surfacing as `os error 5` on
# cleanup. The target dir is excluded from AV scanning to prevent this. After a
# `cargo clean`, the first build re-creates the probes; if AV ever re-locks them,
# simply re-run the build.

[build]
target-dir = "C:/Users/bosen/AppData/Local/cairn-target"

[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]
